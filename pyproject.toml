[project]
name = "nuclei-graph"
version = "0.1.0"
authors = [{ name = "Karolína Rusnačková", email = "525276@mail.muni.cz" }]
requires-python = ">=3.11, <3.13"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "torch>=2.6.0",
    "pyefd>=1.6.0",
    "lightning>=2.4.0",
    "torchmetrics>=1.4.1",
    "scikit-learn>=1.5.2",
    "ipykernel>=6.29.5",
    "ray==2.35.0",
    "einops>=0.8.1",
    "hydra-core>=1.3.2",
    "pandas>=2.3.2",
    "maturin>=1.9.4",
    "torch-geometric>=2.6.1",
    "rationai-mlkit @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/mlkit.git",
    "rationai-tiling @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/tiling.git",
    "rationai-masks @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/masks.git",
    "transformers>=4.56.0",
    "pip>=25.2",
    "mlflow==2.22.0",
    "warmup-scheduler>=0.3",
    "torchvision>=0.23.0",
    "pyvips[binary]>=3.0.0",
    "openslide-python>=1.4.2",
    "openslide-bin>=4.0.0.8",
]

[tool.pdm.dependencies]
graph_pytorch_ext = { path = "lib/graph_pytorch_ext", develop = true }

[tool.pdm.scripts]
train = "python -m nuclei_graph mode=fit"
validate = "python -m nuclei_graph mode=validate"
test = "python -m nuclei_graph mode=test"
predict = "python -m nuclei_graph mode=predict"
build_ext = "pdm run maturin develop --release -m lib/graph_pytorch_ext/Cargo.toml"
l = { composite = ["lint", "format", "mypy"] }
lint = "ruff check --fix"
format = "ruff format"
mypy = "mypy ."
post_install = { composite = [
    "pre-commit autoupdate",
    "pre-commit install",
    "pre-commit install --hook-type commit-msg",
] }

[tool.pdm]
distribution = false

[dependency-groups]
dev = ["mypy", "pre-commit", "ruff"]
