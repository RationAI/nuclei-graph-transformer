[project]
name = "nuclei-graph"
version = "0.1.0"
authors = [{ name = "Karolína Rusnačková", email = "525276@mail.muni.cz" }]
requires-python = ">=3.11, <3.13"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "torch>=2.6.0",
    "pyefd>=1.6.0",
    "lightning>=2.4.0",
    "einops>=0.8.1",
    "torchmetrics>=1.4.1",
    "torch-geometric>=2.6.1",
    "transformers>=4.56.0",
    "scikit-learn>=1.5.2",
    "warmup-scheduler>=0.3",
    "ray==2.35.0",
    "hydra-core>=1.3.2",
    "pandas>=2.3.2",
    "mlflow==2.22.0",
    "pyvips[binary]>=3.0.0",
    "openslide-python>=1.4.2",
    "openslide-bin>=4.0.0.8",
    "graph_pytorch_ext",
    "rationai-masks",
    "rationai-mlkit",
]

[tool.uv.sources]
graph_pytorch_ext = { git = "ssh://git@gitlab.ics.muni.cz/rationai/digital-pathology/pathology/nuclei-foundational-model.git", branch = "borisim-develop", subdirectory = "lib/graph_pytorch_ext" }
rationai-mlkit = { git = "https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/mlkit.git" }
rationai-masks = { git = "https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/masks.git" }

[dependency-groups]
dev = ["mypy", "pre-commit", "ruff"]
