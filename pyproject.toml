[project]
name = "nuclei-graph-transformer"
version = "0.1.0"
authors = [
    { name = "Karolína Rusnačková", email = "525276@mail.muni.cz" },
    { name = "Matěj Pekár", email = "matejpekar@mail.muni.cz" },
]
requires-python = ">=3.11, <3.14"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "torch>=2.6.0",
    "pyefd>=1.6.0",
    "lightning>=2.4.0",
    "torchmetrics>=1.4.1",
    "scikit-learn>=1.5.2",
    "ipykernel>=6.29.5",
    "ray>=2.35.0",
    "einops>=0.8.1",
    "hydra-core>=1.3.2",
    "torch-geometric>=2.6.1",
    "transformers>=4.56.0",
    "mlflow==2.22.0",
    "warmup-scheduler>=0.3",
    "torchvision>=0.23.0",
    "openslide-python>=1.4.2",
    "degraph",
    "rationai-masks",
    "rationai-mlkit",
    "rationai-tiling",
    "ratiopath>=1.0.3",
]

[tool.uv.sources]
degraph = { git = "ssh://git@gitlab.ics.muni.cz/rationai/digital-pathology/pathology/nuclei-foundational-model.git", branch = "borisim-develop", subdirectory = "lib/degraph" }
rationai-mlkit = { git = "https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/mlkit.git" }
rationai-masks = { git = "https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/masks.git" }
rationai-tiling = { git = "https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/tiling.git" }

[dependency-groups]
dev = ["mypy", "pre-commit", "ruff"]
