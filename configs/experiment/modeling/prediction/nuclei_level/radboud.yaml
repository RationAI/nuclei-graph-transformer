# @package _global_

defaults:
  - /experiment/modeling/inference/base@_here_
  - /data/sources/panda
  - /model/meta_archs@model: nuclei_wsl
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.supervision.eval_strategy: annotation
  - /callbacks/predictions@trainer.callbacks.predictions: wsl
  - /callbacks@trainer.callbacks.nuclei_masks: nuclei_masks
  - _self_

checkpoint: mlflow-artifacts:/37/c6542ff73c8e4460a8451a1a9c757520/artifacts/epoch=307-step=6776/wsl_cam_checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.e-infra.cz/#/experiments/37/runs/c6542ff73c8e4460a8451a1a9c757520

data:
  batch_size: 1
  metadata:
    predict: ${dataset.providers.radboud.metadata.test}
  dataset:
    alpha: 0.8
    k: 32
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: true
    mil: false
  supervision:
    paths: ${dataset.providers.radboud.supervision}

model:
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.15

metadata:
  run_name: "📊 Predictions(Radboud): Nucleus-level WSL Classifier (Annot Eval)"
  description: "Predictions: [MLflow training run](${checkpoint_url})"
