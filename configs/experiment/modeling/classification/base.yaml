# @package _global_

defaults:
  - /model/meta_archs: ???
  - /model/models@model.net: ???
  - /data/datasets@data.dataset: ???
  - /data/samplers@data.sampler: ???
  - /data/supervision@data.train_strategy: ???
  - /data/supervision@data.eval_strategy: ???

mode: fit

dataset: ???

trainer:
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 1
      monitor: validation/loss
      mode: min
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/loss
      mode: min
      patience: 35

data:
  sampler_pos_thr: ???
  balance_sampling: ???
  batch_size: ???
  split_size: ???
  mlflow_uris:
    metadata: ${dataset.mlflow_uris.metadata}
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    crop_size: ???
    alpha: ???
    k: ???
    attn_block_size: ???
    efd_order: ???
    symmetric_block_mask: ???

model:
  lr: ???
  warmup_epochs: ???
  net:
    config:
      dim: ???
      hidden_dim: ???
      num_heads: ???
      num_layers: ???
      num_classes: ???
      dropout: ???

metadata:
  run_name: ???
  hyperparams:
    train_supervision_mode: ${data.train_strategy.mode}
    validation_supervision_mode: ${data.eval_strategy.mode}
    sampler_positivity_threshold: ${data.sampler_pos_thr}
    batch_size: ${data.batch_size}
    split_size: ${data.split_size}
    crop_size: ${data.dataset.crop_size}
    alpha: ${data.dataset.alpha}
    k: ${data.dataset.k}
    attn_block_size: ${data.dataset.attn_block_size}
    efd_order: ${data.dataset.efd_order}
    lr: ${model.lr}
    warmup_epochs: ${model.warmup_epochs}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
