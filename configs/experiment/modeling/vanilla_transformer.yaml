# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/samplers@data.sampler: weighted_random_sampler
  - /data/supervision@data.train_strategy: cam # cam agreement positive_agreement annotation
  - /data/supervision@data.eval_strategy: agreement

mode: fit

trainer:
  gradient_clip_val: 0.7
  accumulate_grad_batches: 3
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 1
      monitor: validation/loss
      mode: min
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/loss
      mode: min
      patience: 35

data:
  sampler_pos_thr: 0.10
  balance_sampling: true
  batch_size: 16
  split_size: 0.1
  mlflow_uris:
    metadata: ${dataset.mlflow_uris.metadata}
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    crop_size: 4096
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    symmetric_block_mask: False

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      efd_order: ${data.dataset.efd_order}
      node_features: ${add:${mul:4,${data.dataset.efd_order}},3} # efd_order * 4 + scale + sin/cos angles
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10

metadata:
  run_name: "Train: Self Attention Transformer"
  description: "higher smapler_thr, with sampling boundary negatives and loss balancing"
  hyperparams:
    train_supervision_mode: ${data.train_strategy.mode}
    validation_supervision_mode: ${data.eval_strategy.mode}
    sampler_positivity_threshold: ${data.sampler_pos_thr}
    batch_size: ${data.batch_size}
    split_size: ${data.split_size}
    crop_size: ${data.dataset.crop_size}
    alpha: ${data.dataset.alpha}
    k: ${data.dataset.k}
    attn_block_size: ${data.dataset.attn_block_size}
    efd_order: ${data.dataset.efd_order}
    lr: ${model.lr}
    warmup_epochs: ${model.warmup_epochs}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
