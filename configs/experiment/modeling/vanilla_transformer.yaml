# @package _global_

defaults:
  - /data/datasets/raw/prostate_cancer
  - /model/models@model.net: self_attn_transformer
  - /data/datasets/graph@data.dataset: default
  - /data/samplers@data.sampler: weighted_random_sampler
  - /data/supervision@data.supervision_strategy: positive_agreement

mode: fit
checkpoint: null

trainer:
  gradient_clip_val: 0.7
  accumulate_grad_batches: 3
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 1
      monitor: validation/loss
      mode: min
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/loss
      mode: min
      patience: 30

data:
  sampler_pos_thr: 0.30
  batch_size: 8
  paths:
    features: ${dataset.paths.features}
  mlflow_uris:
    metadata: ${dataset.mlflow_uris.metadata}
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    crop_size: 4096
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: 42 #${mul:4,${data.dataset.efd_order}}
      dim: 256
      hidden_dim: 1024
      pos_dim: 2 # (x, y, α)
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10

metadata:
  run_name: Train, ${data.supervision_strategy.mode} [(${model.net.config.dim},${model.net.config.hidden_dim},${model.net.config.pos_dim},${model.net.config.num_heads},${model.net.config.num_layers}),(${data.batch_size},${data.dataset.k},${data.dataset.crop_size})(${data.sampler_pos_thr})]
  description: "acc grad batches 3"
  hyperparams:
    supervision_mode: ${data.supervision_strategy.mode}
    cam_thr_type: ${data.supervision_strategy.cam_thr_type}
    sampler_positivity_threshold: ${data.sampler_pos_thr}
    batch_size: ${data.batch_size}
    crop_size: ${data.dataset.crop_size}
    alpha: ${data.dataset.alpha}
    k: ${data.dataset.k}
    attn_block_size: ${data.dataset.attn_block_size}
    efd_order: ${data.dataset.efd_order}
    lr: ${model.lr}
    warmup_epochs: ${model.warmup_epochs}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    pos_dim: ${model.net.config.pos_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
