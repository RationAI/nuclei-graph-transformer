# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - /data/sources@data.dataset: # TODO
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: # TODO
  - /data/samplers@data.sampler: # TODO
  - /data/supervision@data.supervision_strategy: # TODO

mode: fit
checkpoint: null

trainer:
  gradient_clip_val: 0.7
  accumulate_grad_batches: 3
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 1
      monitor: validation/loss
      mode: min
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/loss
      mode: min
      patience: 30

data: {}

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: ${add:${mul:4,${data.dataset.efd_order}},3} # efd_order * 4 + sin/cos angles + scale
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10

metadata:
  run_name: "Train: Self Attention Transformer"
  description: "smaller arch"
  hyperparams:
    lr: ${model.lr}
    warmup_epochs: ${model.warmup_epochs}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
