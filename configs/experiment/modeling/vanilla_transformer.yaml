# @package _global_
defaults:
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: prostate_cancer
  - /data/samplers@data.sampler: weighted_random_sampler

mode: fit
checkpoint: null

trainer:
  gradient_clip_val: 0.6
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 1
      monitor: validation/loss
      mode: min
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/loss
      mode: min
      patience: 15

data:
  supervision_mode: "agreement-strict" # "annotation", "cam", "agreement", "agreement-strict"
  cam_thr_type: "annot_restricted_thr" # "annot_restricted_thr" or "default_thr"
  sampler_pos_thr: 0.30
  batch_size: 8
  crop_size: 4096
  alpha: 0.8
  k: 128
  attn_block_size: 128
  efd_order: 15

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: ${mul:4,${data.efd_order}}
      dim: 256
      hidden_dim: 1024
      pos_dim: 2 # (x, y, α)
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10
      layer_scale_init: 1e-4

metadata:
  run_name: Train, ${data.supervision_mode} [(${model.net.config.dim},${model.net.config.hidden_dim},${model.net.config.pos_dim},${model.net.config.num_heads},${model.net.config.num_layers}),(${data.batch_size},${data.k},${data.crop_size})(${data.sampler_pos_thr})]
  hyperparams:
    supervision_mode: ${data.supervision_mode}
    cam_thr_type: ${data.cam_thr_type}
    sampler_positivity_threshold: ${data.sampler_pos_thr}
    batch_size: ${data.batch_size}
    crop_size: ${data.crop_size}
    alpha: ${data.alpha}
    k: ${data.k}
    attn_block_size: ${data.attn_block_size}
    efd_order: ${data.efd_order}
    lr: ${model.lr}
    warmup_epochs: ${model.warmup_epochs}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    pos_dim: ${model.net.config.pos_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
    layer_scale_init: ${model.net.config.layer_scale_init}
