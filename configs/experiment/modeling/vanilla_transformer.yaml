# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - /model/models@model.net: # TODO
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/samplers@data.sampler: # TODO
  - /data/supervision@data.train_strategy: # TODO
  - /data/supervision@data.eval_strategy: # TODO

mode: fit

trainer: {}

data:
  sampler_pos_thr: # TODO
  balance_sampling: # TODO
  batch_size: 8
  split_size: 0.1
  mlflow_uris:
    metadata: ${dataset.mlflow_uris.metadata}
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    crop_size: 4096
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    symmetric_block_mask: False

model: {}

metadata:
  run_name: "Train: Self Attention Transformer"
  description: ""
  hyperparams:
    train_supervision_mode: ${data.train_strategy.mode}
    validation_supervision_mode: ${data.eval_strategy.mode}
    sampler_positivity_threshold: ${data.sampler_pos_thr}
    batch_size: ${data.batch_size}
    split_size: ${data.split_size}
    crop_size: ${data.dataset.crop_size}
    alpha: ${data.dataset.alpha}
    k: ${data.dataset.k}
    attn_block_size: ${data.dataset.attn_block_size}
    efd_order: ${data.dataset.efd_order}
