# @package _global_

defaults:
  - /experiment/modeling/inference/base@_here_
  - /data/sources/prostate_cancer
  - /model/meta_archs@model: nuclei_mil
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.supervision.eval_strategy: annotation
  - _self_

checkpoint: mlflow-artifacts:/97/b554746935e74b9fa04f6830ffb69ced/artifacts/checkpoints/epoch=73-step=1554/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/b554746935e74b9fa04f6830ffb69ced

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.MILPredictionMetricsCallback
    - _target_: nuclei_graph.callbacks.MILPredictionsCallback
      mlflow_artifact_path: "predictions"
    - _target_: nuclei_graph.callbacks.MILAttentionMasksCallback
      level: 2
      mask_tile_width: 512
      mask_tile_height: 512
      mlflow_artifact_path: "attention_masks"

data:
  batch_size: 1
  dataset:
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: false
    mil: true

model:
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.10

metadata:
  run_name: "📊 Predictions: Crop-level Supervised Classifier"
  description: "Predictions: [MLflow training run](${checkpoint_url})"
