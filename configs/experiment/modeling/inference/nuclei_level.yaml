# @package _global_

defaults:
  - /experiment/modeling/inference/base@_here_
  - /data/sources/prostate_cancer
  - /model/meta_archs@model: nuclei_wsl
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.eval_strategy: dense
  - _self_

checkpoint: mlflow-artifacts:/97/61fba54911614186a4a769db6d02f394/artifacts/checkpoints/epoch=97-step=1470/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/61fba54911614186a4a769db6d02f394

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.WSLPredictionMetricsCallback
    - _target_: nuclei_graph.callbacks.WSLPredictionsCallback
      mlflow_artifact_path: "predictions"
    - _target_: nuclei_graph.callbacks.WSLPredictionMasksCallback
      level: 2
      mask_tile_width: 512
      mask_tile_height: 512
      mlflow_artifact_path: "prediction_masks"

data:
  batch_size: 1
  dataset:
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: false

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      dropout: 0.10

metadata:
  run_name: "📊 Predictions: Nucleus-level WSL Classifier"
  description: "Predictions: [MLflow training run](${checkpoint_url})"
  hyperparams:
    prediction_supervision_mode: ${data.eval_strategy.mode}
    checkpoint: ${checkpoint}
