# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - /model/meta_archs: nuclei_wsl
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.eval_strategy: predictions

checkpoint: mlflow-artifacts:/97/434f1b72d8d846518eded65859005da8/artifacts/checkpoints/epoch=130-step=3930/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/434f1b72d8d846518eded65859005da8

data:
  batch_size: 1
  dataset:
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: false

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10

metadata:
  run_name: "📊 Predictions: Nucleus-level WSL Classifier"
  description: "Predictions: [MLflow training run](${checkpoint_url})"
  hyperparams:
    prediction_supervision_mode: ${data.eval_strategy.mode}
    checkpoint: ${checkpoint}
