# @package _global_

defaults:
  - /experiment/modeling/inference/base@_here_
  - /data/sources/prostate_cancer_mmci_tl
  - /model/meta_archs@model: nuclei_mil
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.supervision.eval_strategy: annotation # annotation prediction
  - /callbacks/predictions/metrics_dataset@trainer.callbacks.metrics_dataset: mil # graph-level preds
  - /callbacks/predictions/metrics_dataset@trainer.callbacks.metrics_dataset: wsl # nuclei-level preds
  - /callbacks/predictions/metrics_slide@trainer.callbacks.metrics_slide: wsl # nuclei-level preds
  - /callbacks/predictions/labels@trainer.callbacks.labels: mil # graph-level and nuclei-level preds
  - /callbacks/predictions@trainer.callbacks.nuclei_masks: nuclei_masks # nuclei-level preds
  - /callbacks/attention@trainer.callbacks.attn_masks: nuclei_masks
  - _self_

checkpoint: mlflow-artifacts:/97/b554746935e74b9fa04f6830ffb69ced/artifacts/checkpoints/epoch=73-step=1554/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/b554746935e74b9fa04f6830ffb69ced

data:
  batch_size: 1
  mlflow_uris:
    supervision: ${dataset.mlflow_uris.supervision}
    metadata:
      predict: ${dataset.mlflow_uris.metadata.test}
  dataset:
    alpha: 0.8
    k: 32
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: false
    mil: true

model:
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.35

metadata:
  run_name: "📊 Predictions(MMCI): MIL Classifier"
  description: "Predictions: [MLflow training run](${checkpoint_url})"