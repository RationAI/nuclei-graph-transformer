# @package _global_

defaults:
  - /experiment/modeling/inference/base@_here_
  - /data/sources/panda
  - /model/meta_archs@model: nuclei_wsl
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.supervision.eval_strategy: annotation/radboud # annotation/radboud prediction
  - /callbacks/predictions/metrics_dataset@trainer.callbacks.metrics_dataset: wsl
  - /callbacks/predictions/metrics_slide@trainer.callbacks.metrics_slide: wsl
  - /callbacks/predictions/labels@trainer.callbacks.labels: wsl
  - /callbacks/predictions@trainer.callbacks.nuclei_masks: nuclei_masks
  - /callbacks/thresholds/plot_curves@trainer.callbacks.thresholds: wsl
  - _self_

checkpoint: # TODO
checkpoint_url: # TODO

data:
  batch_size: 1
  mlflow_uris:
    supervision: ${dataset.providers.radboud.supervision}
    metadata:
      predict: ${dataset.providers.radboud.metadata.test}
  dataset:
    alpha: 0.8
    k: 32
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: true
    mil: false

model:
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.15

metadata:
  run_name: "📊 Predictions(Radboud): Nucleus-level WSL Classifier (Virchow2 Eval)"
  description: "Predictions: [MLflow training run](${checkpoint_url})"
