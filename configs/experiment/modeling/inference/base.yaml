# @package _global_

mode: predict

checkpoint: ???
checkpoint_url: ???

trainer:
  callbacks: ???

data:
  batch_size: 1
  mlflow_uris:
    metadata:
      predict: ${dataset.mlflow_uris.metadata.test}
    supervision: ${dataset.mlflow_uris.supervision}
  supervision:
    train_strategy: null

model:
  net:
    config:
      efd_order: ${data.dataset.efd_order}
      node_features: ${add:${mul:4,${data.dataset.efd_order}},3} # efd_order * 4 + scale + sin/cos angles
      norm_dim: ${add:${mul:4,${data.dataset.efd_order}},1} # efd_order * 4 + scale
      num_classes: 1

metadata:
  run_name: ???
  description: "Predictions: [MLflow training run](${checkpoint_url})"
  hyperparams:
    prediction_supervision_mode: ${data.eval_strategy.mode}
    checkpoint: ${checkpoint}
