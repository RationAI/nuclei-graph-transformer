# @package _global_

mode: validate

checkpoint: ???
checkpoint_url: ???

trainer:
  callbacks: {}

data:
  batch_size: 1
  split_size: ???
  split_stratify_col: ???
  split_group_col: ???
  supervision:
    train_strategy: null

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      efd_order: ${data.dataset.efd_order}
      node_features: ${add:${mul:4,${data.dataset.efd_order}},3} # efd_order * 4 + scale + sin/cos angles
      norm_dim: ${add:${mul:4,${data.dataset.efd_order}},1} # efd_order * 4 + scale
      num_classes: 1

metadata:
  run_name: ???
  description: "ROC and PR Curves: [MLflow training run](${checkpoint_url})"
  hyperparams:
    validation_supervision_mode: ${data.supervision.eval_strategy.mode}
    checkpoint: ${checkpoint}
