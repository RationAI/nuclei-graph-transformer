# @package _global_

defaults:
  - /experiment/modeling/validation/base@_here_
  - /data/sources/panda
  - /model/meta_archs@model: nuclei_wsl
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.supervision.eval_strategy: annotation
  - /callbacks/plot_curves@trainer.callbacks.thresholds: wsl
  - _self_

checkpoint: # TODO
checkpoint_url: # TODO

data:
  batch_size: 1
  split_stratify_col: "gleason_score"
  split_group_col: null
  split_size: 0.1
  metadata: ${dataset.mlflow_uris.metadata}
  dataset:
    alpha: 0.8
    efd_order: 10
    crop_size: 4096
    mil: false
  supervision:
    paths: ${dataset.providers.radboud.supervision}

model:
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.15

metadata:
  run_name: "📊 Threshold Estimation(Radboud): Nuclei-Level WSL Classifier"
