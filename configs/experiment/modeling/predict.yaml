# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.eval_sup_strategy: predictions

mode: predict
checkpoint: mlflow-artifacts:/97/6ec5ae4122404e57aa062503f22da572/artifacts/checkpoints/epoch=54-step=1650/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/6ec5ae4122404e57aa062503f22da572

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.PredictionMetricsCallback
    - _target_: nuclei_graph.callbacks.PredictionsCallback
      mlflow_artifact_path: "predictions"
    - _target_: nuclei_graph.callbacks.PredictionMasksCallback
      level: 2
      mask_tile_width: 512
      mask_tile_height: 512
      mlflow_artifact_path: "prediction_masks"

data:
  batch_size: 1
  balance_sampling: null
  mlflow_uris:
    metadata:
      predict: ${dataset.mlflow_uris.metadata.test}
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: false

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      efd_order: ${data.dataset.efd_order}
      node_features: ${add:${mul:4,${data.dataset.efd_order}},3}
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10

metadata:
  run_name: 📊 Predictions
  description: "Predictions: [MLflow training run](${checkpoint_url})"
  hyperparams:
    prediction_supervision_mode: ${data.eval_sup_strategy.mode}
    checkpoint: ${checkpoint}
