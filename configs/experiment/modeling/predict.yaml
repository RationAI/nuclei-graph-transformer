# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/supervision@data.eval_supervision_strategy: agreement

mode: predict
checkpoint: mlflow-artifacts:/97/8f482a006253405885d335a0a39b483e/artifacts/checkpoints/epoch=171-step=5160/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/8f482a006253405885d335a0a39b483e

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.PredictionMetricsCallback
    - _target_: nuclei_graph.callbacks.PredictionsCallback
      mlflow_artifact_path: "predictions"
    - _target_: nuclei_graph.callbacks.PredictionMasksCallback
      level: 2
      mask_tile_width: 512
      mask_tile_height: 512
      mlflow_artifact_path: "prediction_masks"

data:
  batch_size: 1
  mlflow_uris:
    metadata:
      predict: ${mlflow_project}/63751b7c9169498389254f8a180bc5de/artifacts/tile_level_annotations_test/slides_mapping.parquet
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096
    symmetric_block_mask: False

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      efd_order: ${data.dataset.efd_order}
      node_features: ${add:${mul:4,${data.dataset.efd_order}},3}
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10

metadata:
  run_name: 📊 Predictions
  description: "Predictions: [MLflow training run](${checkpoint_url})"
  hyperparams:
    checkpoint: ${checkpoint}
