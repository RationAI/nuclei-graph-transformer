# @package _global_

defaults:
  - /data/datasets/raw/prostate_cancer
  - /model/models@model.net: self_attn_transformer
  - /data/datasets/graph@data.dataset: default
  - /data/supervision@data.supervision_strategy: positive_agreement

mode: predict
checkpoint: mlflow-artifacts:/97/539aa76659014a3782172f1f441e6176/artifacts/checkpoints/epoch=97-step=2940/checkpoint.ckpt
checkpoint_url: https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/539aa76659014a3782172f1f441e6176

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.PredictionsCallback
    - _target_: nuclei_graph.callbacks.PredictionMetricsCallback

data:
  sampler_pos_thr: 0.30
  batch_size: 1
  paths:
    features:
      predict: /mnt/projects/nuclei_based_wsi_analysis/nuclei_efd/tile_level_annotations_test
  mlflow_uris:
    metadata:
      predict: mlflow-artifacts:/97/63751b7c9169498389254f8a180bc5de/artifacts/tile_level_annotations_test/slides_mapping.parquet
    supervision: ${dataset.mlflow_uris.supervision}
  dataset:
    alpha: 0.8
    k: 64
    attn_block_size: 128
    efd_order: 10
    crop_size: 4096

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: 42 # ${mul:4,${data.dataset.efd_order}}
      dim: 512
      hidden_dim: 2048
      num_heads: 16
      num_layers: 16
      num_classes: 1
      dropout: 0.1

metadata:
  run_name: 📊 Predictions
  description: "Prediction Metrics: [MLflow training run](${checkpoint_url})"
  tags:
    model_layers: ${model.net.config.num_layers}
    model_hidden_dim: ${model.net.config.hidden_dim}
    supervision: ${data.supervision_strategy.mode}
    sampler_pos_thr: ${data.sampler_pos_thr}
    k: ${data.dataset.k}
    efd_order: ${data.dataset.efd_order}
  hyperparams:
    checkpoint: ${checkpoint}
