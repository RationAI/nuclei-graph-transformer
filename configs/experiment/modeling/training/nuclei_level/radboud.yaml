# @package _global_

defaults:
  - /experiment/modeling/training/base@_here_
  - /data/sources/panda
  - /model/meta_archs@model: nuclei_wsl
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/samplers@data.sampler: weighted_random_sampler
  - /data/supervision@data.supervision.train_strategy: annotation
  - /data/supervision@data.supervision.eval_strategy: agreement
  - _self_

monitor: validation/loss

trainer:
  max_epochs: 350
  gradient_clip_val: 0.7
  #accumulate_grad_batches: 2

data:
  batch_size: 64
  split_stratify_col: "gleason_score"
  split_group_col: null
  split_size: 0.1
  mlflow_uris:
    metadata: ${dataset.providers.radboud.metadata}
  dataset:
    crop_size: 4096
    alpha: 0.8
    k: 32
    attn_block_size: 128
    efd_order: 10
    symmetric_block_mask: false
    mil: false
  sampler:
    positivity_thr: 0.05
    pos_slide_ratio: 0.75

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.15

metadata:
  run_name: "Train: Nucleus-level WSL Self Attention Transformer"
  description: ""
