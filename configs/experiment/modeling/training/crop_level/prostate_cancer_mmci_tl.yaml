# @package _global_

defaults:
  - /experiment/modeling/training/base@_here_
  - /data/sources/prostate_cancer_mmci_tl
  - /model/meta_archs@model: nuclei_mil
  - /model/models@model.net: self_attn_transformer
  - /data/datasets@data.dataset: nuclei_dataset
  - /data/samplers@data.sampler: weighted_random_sampler
  - /data/supervision@data.supervision.train_strategy: annotation
  - /data/supervision@data.supervision.eval_strategy: annotation
  - _self_

monitor: validation/graph/loss

trainer:
  max_epochs: 150
  gradient_clip_val: 0.7
  #accumulate_grad_batches: 2

data:
  batch_size: 32
  split_stratify_col: "is_carcinoma"
  split_group_col: "patient_id"
  split_size: 0.1
  metadata: ${dataset.mlflow_uris.metadata}
  dataset:
    crop_size: 4096
    crop_pos_thr: 0.75
    alpha: 0.8
    k: 32
    attn_block_size: 128
    efd_order: 10
    symmetric_block_mask: false
    mil: true
  supervision:
    paths: ${dataset.paths.supervision}
  sampler:
    positivity_thr: 0.0
    pos_slide_ratio: 0.5

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      dim: 256
      hidden_dim: 1024
      num_heads: 8
      num_layers: 8
      drop_path_rate: 0.25

metadata:
  run_name: "Train(MMCI): Crop-level SL Self Attention Transformer"
  description: ""
