# @package _global_

defaults:
  - /data/sources/prostate_cancer
  - _self_

model_name: Virchow2
heatmap_uri: ${dataset.mlflow_uris.masks.prediction.virchow2}
metadata_uris:
  - ${dataset.mlflow_uris.exploration.test}
overlap_threshold: 0.5
positive_threshold: 0.85
label_column: pred_label
mlflow_artifact_path: prediction_labels

metadata:
  run_name: "🏷️ Nuclei ${model_name}-based Labeling: ${dataset.name}"
  description: Nuclei labeling based on predictions of the [Virchow2 model](https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/65/runs/800dfeef2ff849d9b2abdd39defcb996).
  hyperparams:
    positive_threshold: ${positive_threshold}
