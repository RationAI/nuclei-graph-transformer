# @package _global_

defaults:
  - /data/sources/prostate_cancer_mmci_tl
  - _self_

heatmap_uri: ${dataset.mlflow_uris.masks.annotation}
metadata_uris:
  - ${dataset.mlflow_uris.exploration.train}
  - ${dataset.mlflow_uris.exploration.test}
exclude_slides_uris:
  - ${dataset.mlflow_uris.masks.missing.annotation}
overlap_threshold: 1.0
positive_threshold: 0.0 # annotation masks are binary
label_column: annot_label
mlflow_artifact_path: annotation_labels

metadata:
  run_name: "🏷️ Nuclei Annotation-based Labeling: ${dataset.name}"
