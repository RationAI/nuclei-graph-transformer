# @package _global_
defaults:
  - /model/models@model.net: pure_self-attn_transformer
  - /data/datasets@data.train: nuclei_dataset/train
  - /data/datasets@data.val: nuclei_dataset/val
  - /data/datasets@data.test: nuclei_dataset/test
  - /data/samplers@data.sampler: weighted_random_sampler
  - override /data/transforms@data.train.transforms: normalize
  - override /data/transforms@data.val.transforms: normalize
  - override /data/transforms@data.test.transforms: normalize

checkpoint: null

model:
  lr: 1e-4
  net:
    config:
      node_features: 40
      dim: 256
      hidden_dim: 1024
      pos_dim: 2 # (x, y, α)
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.10
      layer_scale_init: 1e-4

data:
  batch_size: 16
  k: 128
  attn_block_size: 128
  crop_size: 4096

metadata:
  experiment_name: Graph Transformer
  run_name: "Pure Self-Attention (256,1024,2,8,8),(16,128,4096)(0.30)"
  description: "testing run"
  hyperparams:
    sampler_positivity_threshold: ${data.sampler.positivity_threshold}
    batch_size: ${data.batch_size}
    k: ${data.k}
    attn_block_size: ${data.attn_block_size}
    crop_size: ${data.crop_size}
    lr: ${model.lr}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    pos_dim: ${model.net.config.pos_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
    layer_scale_init: ${model.net.config.layer_scale_init}
