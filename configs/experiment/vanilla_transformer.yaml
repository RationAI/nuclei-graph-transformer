# @package _global_
defaults:
  - /model/models@model.net: nuclei_transformer
  - /losses@model.criterion: supervised_bce
  - /data/datasets@data.train: nuclei_dataset/train
  - /data/datasets@data.test: nuclei_dataset/test
  - /data/samplers@data.sampler: weighted_random_sampler

mode: fit

trainer:
  gradient_clip_val: 0.8
  accumulate_grad_batches: 4
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 1
      monitor: validation/loss
      mode: min
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/loss
      mode: min
      patience: 15

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: 41 # 4 * EFD_order + 1 (scale)
      dim: 512
      hidden_dim: 2048
      pos_dim: 2 # (x, y, α)
      num_heads: 16
      num_layers: 16
      num_classes: 1
      dropout: 0.10
      layer_scale_init: 1e-4
  augmentations: ${oc.select:model.criterion.augmentations, null}

data:
  batch_size: 8
  crop_size: 4096
  alpha: 0.8
  k: 128
  attn_block_size: 128
  efd_order: 10

metadata:
  experiment_name: Nuclei Graph — Transformer
  run_name: Train [(${model.net.config.dim},${model.net.config.hidden_dim},${model.net.config.pos_dim},${model.net.config.num_heads},${model.net.config.num_layers}),(${data.batch_size},${data.k},${data.crop_size})(${data.sampler.positivity_thr})]
  description: "testing run"
  hyperparams:
    sampler_positivity_threshold: ${data.sampler.positivity_thr}
    batch_size: ${data.batch_size}
    crop_size: ${data.crop_size}
    alpha: ${data.alpha}
    k: ${data.k}
    attn_block_size: ${data.attn_block_size}
    efd_order: ${data.efd_order}
    lr: ${model.lr}
    warmup_epochs: ${model.warmup_epochs}
    criterion: ${model.criterion._target_}
    dim: ${model.net.config.dim}
    hidden_dim: ${model.net.config.hidden_dim}
    pos_dim: ${model.net.config.pos_dim}
    num_heads: ${model.net.config.num_heads}
    num_layers: ${model.net.config.num_layers}
    dropout: ${model.net.config.dropout}
    layer_scale_init: ${model.net.config.layer_scale_init}
