# @package _global_
defaults:
  - /model/models@model.net: pure_self-attn_transformer
  - /data/datasets@data.predict: nuclei_dataset/predict
  - override /data/transforms@data.predict.transforms: normalize

checkpoint: mlflow-artifacts:/92/6c0c949605b142d28cb260e05df9e42d/artifacts/checkpoints/epoch=65-step=11418/checkpoint.ckpt

model:
  lr: 1e-4
  net:
    config:
      node_features: 40
      dim: 512
      hidden_dim: 2048
      pos_dim: 2
      num_heads: 16
      num_layers: 16
      num_classes: 1
      dropout: 0.1
      layer_scale_init: 1e-04

data:
  batch_size: 1
  k: 128
  attn_block_size: 128
  crop_size: 4096

metadata:
  experiment_name: Graph Transformer
  run_name: 📊 Predictions[test] (512,2048,2,16,16),(4,128,4096)(0.40)
