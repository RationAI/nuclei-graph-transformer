# @package _global_
defaults:
  - /model/models@model.net: nuclei_transformer
  - /losses@model.criterion: supervised_bce
  - /data/datasets@data.predict: nuclei_dataset/test

mode: predict
checkpoint: mlflow-artifacts:/97/21bf8f212a9746d3931447e73b76bfd0/artifacts/checkpoints/epoch=26-step=1215/checkpoint.ckpt

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.PredictionsCallback
    - _target_: nuclei_graph.callbacks.PredictionMetricsCallback

data:
  batch_size: 1
  alpha: 0.8
  k: 128
  attn_block_size: 128
  efd_order: 10
  crop_size: 4096

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: ${mul:4,${data.efd_order}}
      dim: 256
      hidden_dim: 1024
      pos_dim: 2
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.1
      layer_scale_init: 1e-4
  augmentations: null

metadata:
  experiment_name: Nuclei Graph — Transformer
  run_name: 📊 Predictions
  description: "Prediction Metrics: [MLflow training run](https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/3e097f07d08c41549788a62c95eb4f3e)"
  hyperparams: {}
