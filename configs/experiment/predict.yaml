# @package _global_
defaults:
  - /model/models@model.net: nuclei_transformer
  - /losses@model.criterion: supervised_bce
  - /data/datasets@data.predict: nuclei_dataset/test
  - override /mode: predict

checkpoint: mlflow-artifacts:/97/c15d7b533feb4fc596816553ac302ea3/artifacts/checkpoints/epoch=53-step=1242/checkpoint.ckpt

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.PredictionsCallback
    - _target_: nuclei_graph.callbacks.PredictionMetricsCallback

model:
  lr: 1e-4
  net:
    config:
      node_features: 41
      dim: 256
      hidden_dim: 1024
      pos_dim: 3
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.1
      layer_scale_init: 1e-4
  augmentations: null

data:
  batch_size: 1
  k: 128
  attn_block_size: 128
  efd_order: 10
  crop_size: 4096

metadata:
  experiment_name: Nuclei Graph — Transformer
  run_name: 📊 Predictions[test]
  description: Prediction Metrics for the run [c15d7b533feb4fc596816553ac302ea3](https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/c15d7b533feb4fc596816553ac302ea3).
  hyperparams: {}
