# @package _global_
defaults:
  - /model/models@model.net: nuclei_transformer
  - /losses@model.criterion: supervised_bce
  - /data/datasets@data.predict: nuclei_dataset/test

mode: predict

checkpoint: mlflow-artifacts:/97/d29604c6c99f435c8df61e1e8a3c22c4/artifacts/checkpoints/epoch=7-step=184/checkpoint.ckpt

trainer:
  callbacks:
    - _target_: nuclei_graph.callbacks.PredictionsCallback
    - _target_: nuclei_graph.callbacks.PredictionMetricsCallback

model:
  lr: 1e-4
  warmup_epochs: 8
  net:
    config:
      node_features: 41
      dim: 256
      hidden_dim: 1024
      pos_dim: 3
      num_heads: 8
      num_layers: 8
      num_classes: 1
      dropout: 0.1
      layer_scale_init: 1e-4
  augmentations: null

data:
  batch_size: 1
  alpha: 0.8
  k: 128
  attn_block_size: 128
  efd_order: 10
  crop_size: 4096

metadata:
  experiment_name: Nuclei Graph — Transformer
  run_name: 📊 Predictions
  description: "Prediction Metrics: [MLflow training run](https://mlflow.rationai.cloud.trusted.e-infra.cz/#/experiments/97/runs/d29604c6c99f435c8df61e1e8a3c22c4)"
  hyperparams: {}
