# @package _global_

mlflow:
  tracking_uri: http://mlflow.rationai-mlflow:5000/

# Paths to the slides metadata parquet files generated by `preprocessing/metadata_mapping/prostate_cancer_mmci_tl.py`.
train_metadata_uri: mlflow-artifacts:/97/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations/slides_mapping.parquet
test_metadata_uri: mlflow-artifacts:/97/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations_test/slides_mapping.parquet

reporter:
  _target_: report.reporter.ReportAssembler
  title: "Nuclei Carcinoma Predictions: MMCI Tile-Level Annotations Data"
  metrics_run_ids:
    - 38e3c2ec3ea34202a4661f0b522c0e48 # wsl, virchow2 eval
    - 6272505c6dd34ac2b34233579bcfe402 # wsl, annot eval
    - 88cbd055a6ac47d2bc2be6a4b6d915bc # mil, virchow2 eval
    - dbab5eecd2d448018868754492f949fe # mil, annot eval
  template_asset_path: report_template.html

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.ParquetSlideDatasetMLFlowMaskRetriever
    artifact_uris:
      - mlflow-artifacts:/97/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations_test
    item_path_col: slide_path
    item_name_col: slide_id
    ground_truth_col: is_carcinoma
    layer_name: Prostate WSI

  evaluation_runs:
    38e3c2ec3ea34202a4661f0b522c0e48:
      artifact_file: "slide_nuclei_metrics.json"
      slide_item_key: "key"

    6272505c6dd34ac2b34233579bcfe402:
      artifact_file: "slide_nuclei_metrics.json"
      slide_item_key: "key"

    88cbd055a6ac47d2bc2be6a4b6d915bc:
      artifact_file: "slide_nuclei_metrics.json"
      slide_item_key: "key"

    dbab5eecd2d448018868754492f949fe:
      artifact_file: "slide_nuclei_metrics.json"
      slide_item_key: "key"

  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: cam_masks
      run_id: 23749f39b3f8451485a5c4bc75fd37bd
      layer_name: CAM (VGG-16 Stain)
      shader_conf:
        type: bipolar-heatmap
        params:
          threshold: 40
          opacity: 0.5
          colorHigh: "#00FF00" # green
          colorLow: "#FF0000" # red

    - _target_: report.masks.RunIDMlflowMaskRetriever
      shader_conf:
        type: heatmap
        params:
          use_mode: mask_clip
      run_id: 4ea7cee809a2443389855facba548959
      dir_name: tissue_masks
      layer_name: Tissue

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: annotation_masks
      run_id: fb2e33383e2548c48e5bd4f2a77e47a8
      layer_name: Annotation
      shader_conf:
        visible: True
        opacity: 0.5
        type: edge
        color: "#1F971B" # forest green

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: heatmaps
      run_id: a40c5a17026840bea1828b78af46752d
      layer_name: Virchow2 Prediction Heatmap
      shader_conf:
        type: heatmap
        params:
          threshold: 85
        visible: False
        opacity: 0.80
        color: "#FFA500" # orange

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: nuclei_masks
      run_id: 8df74906691f459899a881a2459eb14c
      layer_name: "WSL Nuclei Preds (CAM supervision)"
      shader_conf:
        visible: False
        type: heatmap
        color: "#00FF00" # green

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: nuclei_masks
      run_id: 3764545472a64a7ca5c378665b4dd886
      layer_name: "MIL Nuclei Preds"
      shader_conf:
        visible: False
        type: heatmap
        color: "#00FF00" # green

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: attention_masks
      run_id: 9f9eae692cad4a4e8d8b1c43b72dea6a
      layer_name: "MIL Attention Masks"
      shader_conf:
        visible: False
        type: heatmap
        color: "#0000FF" # blue

metadata:
  run_name: Report — Nuclei Masks
  description: ""
