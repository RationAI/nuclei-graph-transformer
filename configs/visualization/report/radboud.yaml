# @package _global_

mlflow:
  tracking_uri: https://mlflow.rationai.cloud.e-infra.cz/

# Paths to the slides metadata parquet files generated by `preprocessing/metadata_mapping/prostate_cancer_mmci_tl.py`.
train_metadata_uri: mlflow-artifacts:/37/f5cd24c487b2464e947145ce5c0681c9/artifacts/panda/slides_mapping_train.parquet
test_metadata_uri: mlflow-artifacts:/37/f5cd24c487b2464e947145ce5c0681c9/artifacts/panda/slides_mapping_test.parquet

reporter:
  title: Nuclei Carcinoma PANDA Predictions
  metrics_run_ids: []
  #  - TODO
  template_asset_path: report_template.html

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.SlideRetriever
    paths:
      _target_: report.masks.mlflow_slide_retriever
      urls:
        #- ${train_metadata_uri}
        - ${test_metadata_uri}
      key: "slide_path"
    layer_name: Prostate WSI

  # evaluation_runs:
  #   TODO:
  #     artifact_file: "slide_nuclei_metrics.json"
  #     slide_item_key: "key"

  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: annotation_masks/radboud
      run_id: 40aeb2e23d8549a18841ad0db5718e4d
      layer_name: Annotation
      shader_conf:
        visible: False
        opacity: 0.5
        type: edge
        color: "#1F971B" # forest green

