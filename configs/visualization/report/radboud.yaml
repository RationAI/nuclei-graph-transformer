# @package _global_

mlflow:
  tracking_uri: https://mlflow.rationai.cloud.e-infra.cz/

# Paths to the slides metadata parquet files generated by `preprocessing/metadata_mapping/prostate_cancer_mmci_tl.py`.
train_metadata_uri: mlflow-artifacts:/37/9e541079930843408775c3fec5cdaf0d/artifacts/panda/slides_mapping_train.parquet
test_metadata_uri: mlflow-artifacts:/37/9e541079930843408775c3fec5cdaf0d/artifacts/panda/slides_mapping_test.parquet

reporter:
  title: Nuclei Carcinoma PANDA Predictions
  metrics_run_ids: []
  template_asset_path: report_template.html

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.SlideRetriever
    paths:
      _target_: report.masks.mlflow_slide_retriever
      urls:
        #- ${train_metadata_uri}
        - ${test_metadata_uri}
      key: "slide_path"
    layer_name: Prostate WSI

  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: radboud
      run_id: fd754d3c074441b6aed4bcf7aaf6cf2c
      layer_name: Annotation
      shader_conf:
        visible: False
        opacity: 0.5
        type: edge
        color: "#FF0000"

metadata:
  run_name: Report — Nuclei Masks
  description: ""
