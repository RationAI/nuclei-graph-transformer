# @package _global_

mlflow:
  tracking_uri: http://mlflow.rationai-mlflow:5000/

# Paths to the slides metadata parquet files generated by `preprocessing/metadata_mapping.py`.
train_metadata_uri: mlflow-artifacts:/97/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations/slides_mapping.parquet
test_metadata_uri: mlflow-artifacts:/97/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations_test/slides_mapping.parquet

reporter:
  title: Nuclei Prediction Masks
  metrics_run_ids:
  - 49ea1b2fff304c009a1c3b04706c7dfe
  template_asset_path: report_template.html

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.SlideRetriever
    paths:
      _target_: report.masks.mlflow_slide_retriever
      urls:
        #- ${train_metadata_uri}
        - ${test_metadata_uri}
      key: "slide_path"
    layer_name: Prostate WSI

  evaluation_runs:
    49ea1b2fff304c009a1c3b04706c7dfe:
      artifact_file: "slide_nuclei_metrics.json"
      slide_item_key: "key"

  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: cam_masks
      run_id: 23749f39b3f8451485a5c4bc75fd37bd
      layer_name: CAM
      shader_conf:
        type: bipolar-heatmap
        params:
          threshold: 40
          opacity: 0.5
          colorHigh: "#FFFF00" # yellow
          colorLow: "#FF0000" # red

    - _target_: report.masks.RunIDMlflowMaskRetriever
      shader_conf:
        type: heatmap
        params:
          use_mode: mask_clip
      run_id: 4ea7cee809a2443389855facba548959
      dir_name: tissue_masks
      layer_name: Tissue

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: annotation_masks
      run_id: fb2e33383e2548c48e5bd4f2a77e47a8
      layer_name: Annotation
      shader_conf:
        visible: False
        opacity: 0.5
        type: edge
        color: "#FFFF00" # yellow

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: heatmaps
      run_id: a40c5a17026840bea1828b78af46752d
      layer_name: Virchow2
      shader_conf:
        visible: False
        threshold: 85
        opacity: 0.5
        type: edge
        color: "#FF00FF" # magenta

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: nuclei_masks
      run_id: 7ac0b76c0a774b418df68dc30f858363
      layer_name: "WSL Predictions (CAM supervision)"
      shader_conf:
        visible: False
        type: heatmap
        color: "#00FF00" # green

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: attention_masks
      run_id: dff85e78a11f42dd94ae80afb405250f
      layer_name: "MIL Attention Masks"
      shader_conf:
        visible: False
        type: heatmap
        color: "#0000FF" # blue

metadata:
  run_name: Report — Nuclei Masks
  description: ""
