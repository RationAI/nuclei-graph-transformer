# @package _global_

defaults:
  - /data/datasets/prostate_cancer
  - _self_

train_metadata_uri: ${dataset.mlflow_uris.metadata.train}
test_metadata_uri: ${dataset.mlflow_uris.metadata.test}

reporter:
  title: Nuclei Segmentation Masks
  template_asset_path: report_template.html
  metrics_run_ids: []

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.SlideRetriever
    paths:
      _target_: report.masks.mlflow_slide_retriever
      urls:
        - ${train_metadata_uri}
        - ${test_metadata_uri}
      key: "slide_path"
    layer_name: Prostate WSI

  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: cam_masks
      run_id: 0ea9afac7299434889e2e6e9d04d440e
      layer_name: CAM
      shader_conf:
        type: bipolar-heatmap
        params:
          threshold: 40
          opacity: 0.5
          colorHigh: "#FFFF00" # yellow
          colorLow: "#FF0000" # red

    - _target_: report.masks.RunIDMlflowMaskRetriever
      shader_conf:
        type: heatmap
        params:
          use_mode: mask_clip
      run_id: 4ea7cee809a2443389855facba548959
      dir_name: tissue_masks
      layer_name: Tissue

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: annotation_masks
      run_id: fb2e33383e2548c48e5bd4f2a77e47a8
      layer_name: Annotation
      shader_conf:
        opacity: 0.5
        type: edge
        color: "#FFFF00" # yellow

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: nuclei_masks
      run_id: dbf30cff69bb44958ac2bcb2a2d50192
      layer_name: Segmented Nuclei
      shader_conf:
        type: heatmap
        color: "#00FF00" # green

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: nuclei_masks
      run_id: # TODO
      layer_name: Predictions
      shader_conf:
        type: heatmap
        color: "#000000" # black

metadata:
  run_name: Report — Nuclei Masks
  description: ""
