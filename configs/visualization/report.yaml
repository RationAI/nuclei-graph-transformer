# @package _global_

mlflow:
  tracking_uri: http://mlflow.rationai-mlflow:5000/

# Paths to the slides metadata parquet files generated by `preprocessing/metadata_mapping.py`.
train_metadata_uri: mlflow-artifacts:/97/5c4f69059f014d728d669a16eca68c51/artifacts/tile_level_annotations/slides_mapping.parquet
test_metadata_uri: mlflow-artifacts:/97/5c4f69059f014d728d669a16eca68c51/artifacts/tile_level_annotations_test/slides_mapping.parquet

reporter:
  title: Nuclei Segmentation Masks
  template_asset_path: report_template.html
  metrics_run_ids: []

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.SlideRetriever
    paths:
      _target_: report.masks.mlflow_slide_retriever
      urls:
        #- ${train_metadata_uri}
        - ${test_metadata_uri}
      key: "slide_path"
    layer_name: Prostate WSI

  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: cam_masks
      run_id: 23749f39b3f8451485a5c4bc75fd37bd
      layer_name: CAM
      shader_conf:
        type: bipolar-heatmap
        params:
          threshold: 40
          opacity: 0.5
          colorHigh: "#FFFF00" # yellow
          colorLow: "#FF0000" # red

    - _target_: report.masks.RunIDMlflowMaskRetriever
      shader_conf:
        type: heatmap
        params:
          use_mode: mask_clip
      run_id: 4ea7cee809a2443389855facba548959
      dir_name: tissue_masks
      layer_name: Tissue

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: annotation_masks
      run_id: fb2e33383e2548c48e5bd4f2a77e47a8
      layer_name: Annotation
      shader_conf:
        opacity: 0.5
        type: edge
        color: "#FFFF00" # yellow

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: prediction_masks
      run_id: 03fecd4a23d446c7868c3d4cd96adcb0
      layer_name: "Preds Agreement"
      shader_conf:
        visible: False
        type: heatmap
        color: "#0000FF" # blue

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: prediction_masks
      run_id: d8eb0b9b011f49bcbac5a15d81e511f4
      layer_name: "Preds CAM"
      shader_conf:
        visible: False
        type: heatmap
        color: "#000000" # black

    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: prediction_masks
      run_id: ba070eda74d442229b63ce8bed7f1c7b
      layer_name: "Preds Positive Agreement"
      shader_conf:
        visible: False
        type: heatmap
        color: "#00FF00" # green

metadata:
  run_name: Report — Nuclei Masks
  description: ""
