# @package _global_

mlflow:
  tracking_uri: http://mlflow.rationai-mlflow:5000/

reporter:
  title: AMACR Mask
  template_asset_path: report_template.html
  metrics_run_ids: []

  save:
    _target_: report.save.MLFlowReportStorer
    artifact_path: report.html
    metadata:
      user: xrusnack
      experiment_name: Nuclei Graph — Transformer
      run_name: Report
      description: ""

  background:
    _target_: report.masks.BasicImageRetriever
    source_dir: "/mnt/projects/nuclei_based_wsi_analysis/amacr_ground_truth_test/wsi_data"
    globs: ["*.mrxs"]
    layer_name: WSI


  mask_retrievers:
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: mask_raw
      run_id: 3a392afc198448868a224bc246b8b658
      layer_name: Raw AMACR
      shader_conf:
        type: heatmap
        color: "#FF0000" # red
    
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: mask
      run_id: 3a392afc198448868a224bc246b8b658
      layer_name: Dilated AMACR
      shader_conf:
        opacity: 0.4
        type: heatmap
        color: "#0000FF0" # blue
      
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: tissue_mask
      run_id: 3a392afc198448868a224bc246b8b658
      layer_name: Tissue Mask
      shader_conf:
        visible: false
        opacity: 0.4
        type: heatmap
        color: "#000000" # black
    
    - _target_: report.masks.RunIDMlflowMaskRetriever
      dir_name: tissue_mask_eroded
      run_id: 3a392afc198448868a224bc246b8b658
      layer_name: Tissue Mask Eroded
      shader_conf:
        opacity: 0.2
        type: heatmap
        color: "#FFA500" # orange

metadata:
  run_name: Report — Nuclei Masks
  description: ""
