# @package _global_

dataset:
  name: PANDA

  mask_tile_width: 512
  mask_tile_height: 512

  paths:
    wsi_data:
      slides: ${data_path}/Public/Public/prostate/PANDA/train_images

      # reference ground truth information from the competition
      metadata: ${data_path}/Public/Public/prostate/PANDA/train.csv

      # dataframe with slide-level properties (mpps and extents) and ids of nuclei segmentation files
      slides_properties: /mnt/projects/nuclei_foundation_model/nuclei/PANDA/slides.parquet

    nuclei:
      raw: /mnt/projects/nuclei_foundation_model/nuclei/PANDA/dataset=PANDA
      # preprocessing/nuclei_standardization.py
      standardized: ${project_path}/nuclei_segmentation/PANDA

    masks:
      annotation: ${data_path}/Public/Public/prostate/PANDA/train_label_masks
      carcinoma: mlflow-artifacts:/38/cd504aaafb8c408184584d808a99cf15/artifacts/carcinoma_mask

  mlflow_uris:
    # preprocessing/exploration/panda/save_metadataset.py
    exploration: ${mlflow_project_pc}/4d0f33b6a0774f16b1002072766d5797/artifacts/panda/slides_metadata.csv

  providers:
    radboud:
      # preprocessing/data_split.py
      split: ${mlflow_project_pc}/473a9b175e4e4f899f7f77314492bf11/artifacts/radboud_split/split.csv

      # preprocessing/metadata_mapping/panda.py
      metadata:
        train: ${mlflow_project_pc}/9e541079930843408775c3fec5cdaf0d/artifacts/panda/slides_mapping_train.parquet
        test: ${mlflow_project_pc}/9e541079930843408775c3fec5cdaf0d/artifacts/panda/slides_mapping_test.parquet
        predict: null

      supervision:
        # preprocessing/unipolar_heatmap_labels.py
        annotation: ${project_path}/nuclei_supervision/PANDA/Radboud/annotation
