# @package _global_

dataset:
  name: MMCI Tile-Level Annotations Data
  target_mpp: 0.25

  # must match across all masks in order to be displayed correctly together in xOpat
  mask_tile_width: 512
  mask_tile_height: 512

  paths:
    wsi_data:
      train: ${data_path}/tile_level_annotations
      test: ${data_path}/tile_level_annotations_test
    # preprocessing/nuclei_segmentation.py
    nuclei_seg: ${project_path}/nuclei_segmentation

  mlflow_uris:
    # exploration/save_metadataset.py
    exploration:
      train: ${mlflow_project}/cfb8ac28a8124aba9aa8553863302f1d/artifacts/tile_level_annotations/slides_metadata.csv
      test: ${mlflow_project}/cfb8ac28a8124aba9aa8553863302f1d/artifacts/tile_level_annotations_test/slides_metadata.csv

    masks:
      tissue: mlflow-artifacts:/65/4ea7cee809a2443389855facba548959/artifacts/tissue_masks
      # preprocessing/annotation_masks.py
      annotation: ${mlflow_project}/fb2e33383e2548c48e5bd4f2a77e47a8/artifacts/annotation_masks
      # preprocessing/merge_cam_masks.py
      cam: ${mlflow_project}/23749f39b3f8451485a5c4bc75fd37bd/artifacts/cam_masks
      prediction:
        virchow2: mlflow-artifacts:/65/a40c5a17026840bea1828b78af46752d/artifacts/heatmaps
      missing:
        cam: ${mlflow_project}/23749f39b3f8451485a5c4bc75fd37bd/artifacts/missing_cam_masks.csv
        annotation: ${mlflow_project}/fb2e33383e2548c48e5bd4f2a77e47a8/artifacts/missing_annotations.csv

    # preprocessing/metadata_mapping.py
    metadata:
      train: ${mlflow_project}/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations/slides_mapping.parquet
      test: ${mlflow_project}/28a05b3cbc2a434eae6221f103d56020/artifacts/tile_level_annotations_test/slides_mapping.parquet
      predict: null

    supervision:
      # preprocessing/unipolar_heatmap_labels.py
      annotation: ${mlflow_project}/14fdc612694a4badbbe3a6d5f07775cb/artifacts/annotation_labels
      # preprocessing/cam_labels.py
      cam:
        annot_restricted_thr: ${mlflow_project}/fb2f1afab2f347b5a3f7a3f8aba54f80/artifacts/cam_labels
        default_thr: ${mlflow_project}/be8d6076322044ed82636b4c4418820a/artifacts/cam_labels
      model_prediction:
        # preprocessing/unipolar_heatmap_labels.py
        virchow2: ${mlflow_project}/201619e5d640496eb61fbb2f67abca87/artifacts/prediction_labels
