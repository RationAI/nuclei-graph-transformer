# @package _global_

defaults:
  - base
  - _self_

# Note: tile sizes need to be consistent across masks to display correctly in xOpat
mask_tile_width: 512
mask_tile_height: 512
level: 2
max_concurrent: 6
mlflow_artifact_path: annotation_masks

metadata:
  run_name: "🖍️ Annotation Masks: Prostate Cancer"
  description: |
    Annotation Masks for the [Tile-Level Annotations Data](https://youtrack.rationai.cloud.e-infra.cz/articles/PC-A-13/Tile-Level-Annotations-Data). 
    Handles *Carcinoma*, *Exclude* and *Another pathology* regions. The resulting mask marks regions that are *Carcinoma* and are neither *Exclude* nor *Another pathology*.

    Positive slides with no annotations are logged in `missing_annotations.csv`.
  hyperparams:
    level: ${level}
    mask_tile_width: ${mask_tile_width}
    mask_tile_height: ${mask_tile_height}
